<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH APP-V3 | Professional Management</title>
    <style>
        :root { 
            --neon: #00d2ff; 
            --bg: #0b0b0b; 
            --nav-bg: #111;
            --border: #222;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: #efefef; 
            margin: 0; 
            font-size: 12px;
            overflow: hidden;
        }

        /* --- HEADER AREA (Sesuai Screenshot 11) --- */
        header {
            text-align: center;
            padding: 30px 20px 10px 20px;
            background: linear-gradient(to bottom, #111, var(--bg));
        }

        header h1 {
            font-size: 42px;
            margin: 0;
            color: #fff;
            letter-spacing: 5px;
            font-weight: bold;
        }

        header p {
            color: #888;
            margin: 5px 0 20px 0;
            font-size: 14px;
        }

        /* --- MENU NAVIGASI --- */
        .main-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            border-bottom: 2px solid var(--neon);
            padding-bottom: 10px;
        }

        .nav-item {
            color: var(--neon);
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- CONTROL BAR (Dropdown & Search) --- */
        .control-bar {
            background: #111;
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #333;
        }

        select, input {
            background: #000;
            border: 1px solid #333;
            color: var(--neon);
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
        }

        .btn-refresh {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        /* --- TABLE AREA --- */
        .grid-container { 
            width: 100vw; 
            height: calc(100vh - 240px); /* Menyesuaikan tinggi header baru */
            overflow: auto; 
        }

        table { border-collapse: collapse; width: 100%; min-width: 1200px; }
        th { 
            background: var(--neon); 
            color: #000; 
            padding: 12px; 
            position: sticky; 
            top: 0; 
            z-index: 10;
            font-size: 11px;
        }
        td { padding: 10px; border-bottom: 1px solid #222; white-space: nowrap; }
        tr:hover { background: #151515; }
        .img-preview { height: 40px; border-radius: 3px; }

        #loader { text-align: center; padding: 50px; color: var(--neon); display: none; }
    </style>
</head>
<body>

    <header>
        <h1>FISH APP-V3</h1>
        <p>Advanced Management System for Fish & Coral</p>
        
        <div class="main-nav">
            <span class="nav-item">📁 DATABASE</span>
            <span class="nav-item">🚢 PEMBELIAN</span>
            <span class="nav-item">📮 PENGIRIMAN</span>
            <span class="nav-item">📊 STOK</span>
        </div>
    </header>

    <div class="control-bar">
        <button class="btn-refresh" onclick="loadData()">🔄 REFRESH DATABASE</button>
        
        <select id="categoryFilter">
            <option value="">-- SEMUA GRUP --</option>
        </select>

        <input type="text" id="searchInput" placeholder="Cari Kode atau Nama Ikan..." style="width: 250px;">
    </div>

    <div id="loader"><h2>⚡ SEDANG SINKRONISASI DATA...</h2></div>

    <div class="grid-container">
        <div id="tableContainer"></div>
    </div>

    <script>
        const API_URL = "GANTI_DENGAN_URL_WEB_APP_ANDA"; 
        let allData = [];

        async function loadData() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('tableContainer');
            loader.style.display = 'block';
            container.innerHTML = "";
            
            try {
                const response = await fetch(`${API_URL}?action=getFish`);
                const rows = await response.json();
                allData = rows;
                populateCategories(rows);
                renderTable(rows);
                loader.style.display = 'none';
            } catch (err) {
                loader.innerHTML = `<h3 style="color:red">ERROR: ${err}</h3>`;
            }
        }

        function populateCategories(rows) {
            const select = document.getElementById('categoryFilter');
            const categories = new Set();
            for(let i=1; i<rows.length; i++) {
                if(rows[i][1]) categories.add(rows[i][1]); // Asumsi kolom B adalah Grup
            }
            select.innerHTML = '<option value="">-- SEMUA GRUP --</option>';
            Array.from(categories).sort().forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }

        function renderTable(rows) {
            if (!rows || rows.length === 0) return;
            let html = "<table><thead><tr>";
            rows[0].forEach(head => html += `<th>${head}</th>`);
            html += "</tr></thead><tbody>";

            for(let i=1; i < Math.min(rows.length, 1000); i++) {
                html += "<tr>";
                rows[i].forEach((cell, j) => {
                    let content = cell;
                    if (String(cell).includes("http")) {
                        content = `<img src="${cell}" class="img-preview" loading="lazy">`;
                    }
                    html += `<td>${content}</td>`;
                });
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById('tableContainer').innerHTML = html;
        }

        function filterData() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const catVal = document.getElementById('categoryFilter').value;
            const filtered = [allData[0], ...allData.slice(1).filter(row => {
                const matchSearch = row.some(cell => String(cell).toLowerCase().includes(searchVal));
                const matchCat = catVal === "" || row[1] === catVal;
                return matchSearch && matchCat;
            })];
            renderTable(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('categoryFilter').addEventListener('change', filterData);

        loadData();
    </script>
</body>
</html>
