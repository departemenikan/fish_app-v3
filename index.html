<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH APP-V3 | Dynamic Resize</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #0b0b0b; --accent: #ff4444; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); color: #efefef; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- HEADER --- */
        header { text-align: center; padding: 15px 10px; background: #000; border-bottom: 1px solid #222; }
        h1 { font-size: 26px; letter-spacing: 3px; color: #fff; margin: 0; text-shadow: 0 0 10px var(--neon); }
        .subtitle { color: var(--neon); font-size: 9px; margin-bottom: 12px; letter-spacing: 1px; }

        .nav-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; }
        .dropbtn {
            background: rgba(0,0,0,0.8); color: var(--neon); padding: 5px 10px;
            font-weight: bold; border: 1px solid var(--neon); border-radius: 3px; cursor: pointer;
            text-transform: uppercase; font-size: 10px;
        }

        /* --- DATABASE SECTION --- */
        #databaseSection { display: none; background: #000; min-height: 100vh; width: 100%; }
        .controls { display: flex; gap: 8px; padding: 5px; background: #080808; border-bottom: 1px solid #222; }
        .btn { padding: 4px 8px; border: none; cursor: pointer; font-weight: bold; font-size: 9px; color: white; border-radius: 2px; }
        .btn-home { background: var(--accent); }
        .btn-col { background: #333; border: 1px solid var(--neon); color: var(--neon); }
        #searchInput { flex: 1; padding: 4px; background: #111; color: var(--neon); border: 1px solid #333; font-size: 10px; }

        /* --- TABLE DYNAMIC RESIZE --- */
        .table-wrapper { overflow: auto; height: calc(100vh - 50px); width: 100%; }
        table { border-collapse: collapse; width: max-content; min-width: 100%; table-layout: fixed; }

        th { 
            background: #1a1a1a; color: var(--neon); padding: 5px; 
            position: sticky; top: 0; font-size: 10px; text-align: left;
            border: 1px solid #333; z-index: 10;
            white-space: nowrap; overflow: hidden;
            position: relative; /* Dasar untuk resizer */
        }

        /* Handle Geser Kolom */
        .resizer {
            position: absolute; right: 0; top: 0; height: 100%; width: 6px;
            background: transparent; cursor: col-resize; z-index: 20;
        }
        .resizer:hover { background: var(--neon); opacity: 0.5; }

        td { 
            padding: 3px 5px; border: 1px solid #222; 
            font-size: 10px; color: #ddd; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis;
        }
        tr:nth-child(even) { background: #050505; }
        tr:hover { background: #151515; }

        .img-cell { height: 25px; width: auto; vertical-align: middle; }
        .hidden-col { display: none; }
        #loader { text-align: center; color: var(--neon); padding: 20px; display: none; }

        /* Dropdown Simple */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; background: #111; min-width: 150px;
            z-index: 100; border: 1px solid var(--neon);
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { color: #ccc; padding: 8px; text-decoration: none; display: block; font-size: 10px; border-bottom: 1px solid #222; }
        .dropdown-content a:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <h1>FISH APP-V3</h1>
        <div class="subtitle">Advanced Management System for Fish & Coral</div>
        <div class="nav-container">
            <div class="dropdown">
                <button class="dropbtn">📁 DATABASE ▾</button>
                <div class="dropdown-content">
                    <a href="#" onclick="openSheet('Master Data Ikan')">Master Data Ikan</a>
                    <a href="#" onclick="openSheet('Customer')">Customer</a>
                    <a href="#" onclick="openSheet('Data Supplier')">Data Supplier</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">🚢 PEMBELIAN ▾</button>
                <div class="dropdown-content">
                    <a href="#" onclick="openSheet('Pembelian Ikan')">Pembelian Ikan</a>
                    <a href="#" onclick="openSheet('Stok List')">Stok List</a>
                </div>
            </div>
        </div>
    </header>

    <section id="databaseSection">
        <div class="controls">
            <button onclick="goHome()" class="btn btn-home">⬅ KEMBALI</button>
            <button onclick="toggleFilterPanel()" class="btn btn-col">⚙️ KOLOM</button>
            <input type="text" id="searchInput" placeholder="Cari data di tabel ini...">
        </div>
        <div id="loader">⚡ MEMUAT DATA...</div>
        <div class="table-wrapper" id="tableContainer"></div>
    </section>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOasisnR1DTEmmsvhLDcNTogQw13f5MkX0U-vUpnHNzWLiSdgO7EisEzM2EgDnYhtP/exec";
        let rawData = [];
        let headers = [];
        let currentSheet = "";

        async function openSheet(sheetName) {
            currentSheet = sheetName;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('databaseSection').style.display = 'block';
            await loadData(sheetName);
        }

        function goHome() {
            document.getElementById('mainHeader').style.display = 'block';
            document.getElementById('databaseSection').style.display = 'none';
        }

        async function loadData(sheet) {
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch(`${SCRIPT_URL}?action=read&sheet=${sheet}`);
                const result = await response.json();
                if (result.status === "success") {
                    rawData = result.data;
                    headers = rawData[0];
                    renderTable();
                }
            } catch (e) { alert("Gagal Memuat Data!"); }
            document.getElementById('loader').style.display = 'none';
        }

        function renderTable() {
            if (rawData.length === 0) return;
            
            // Ambil data lebar kolom dari LocalStorage
            const savedWidths = JSON.parse(localStorage.getItem('colWidths_' + currentSheet)) || {};

            let html = `<table><thead><tr id="headerRow">`;
            headers.forEach((h, i) => {
                const width = savedWidths[h] ? `style="width: ${savedWidths[h]}px"` : "";
                html += `<th ${width}>
                            ${h}
                            <div class="resizer"></div>
                         </th>`;
            });
            html += `</tr></thead><tbody>`;

            for (let i = 1; i < rawData.length; i++) {
                html += "<tr>";
                rawData[i].forEach((cell) => {
                    let val = cell || "";
                    if (typeof val === 'string' && val.includes("http")) {
                        val = `<img src="${val}" class="img-cell">`;
                    }
                    html += `<td>${val}</td>`;
                });
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById('tableContainer').innerHTML = html;

            initResizer();
        }

        function initResizer() {
            const thEls = document.querySelectorAll("th");
            thEls.forEach(th => {
                const resizer = th.querySelector(".resizer");
                if (!resizer) return;

                resizer.addEventListener("mousedown", (e) => {
                    const startX = e.pageX;
                    const startWidth = th.offsetWidth;

                    const onMouseMove = (e) => {
                        const newWidth = startWidth + (e.pageX - startX);
                        if (newWidth > 30) { // Minimal lebar 30px
                            th.style.width = newWidth + "px";
                        }
                    };

                    const onMouseUp = () => {
                        // Simpan hasil geser ke LocalStorage
                        saveColumnWidths();
                        document.removeEventListener("mousemove", onMouseMove);
                        document.removeEventListener("mouseup", onMouseUp);
                    };

                    document.addEventListener("mousemove", onMouseMove);
                    document.addEventListener("mouseup", onMouseUp);
                });
            });
        }

        function saveColumnWidths() {
            const widths = {};
            document.querySelectorAll("th").forEach(th => {
                const name = th.innerText.trim();
                widths[name] = th.offsetWidth;
            });
            localStorage.setItem('colWidths_' + currentSheet, JSON.stringify(widths));
        }

        // Fitur Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const rows = document.querySelectorAll("table tbody tr");
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
            });
        });
    </script>
</body>
</html>
