<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH APP-V3 | Professional Cloud</title>
    <style>
        :root { --neon: #00d2ff; --bg: #0b0b0b; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: #efefef; 
            margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://images.unsplash.com/photo-1524704659690-3f7a37d9ee23?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- HEADER --- */
        header { text-align: center; padding: 40px 20px; }
        h1 { font-size: 48px; letter-spacing: 5px; color: #fff; margin: 0; text-shadow: 0 0 10px var(--neon); }
        .subtitle { color: var(--neon); font-size: 14px; margin-bottom: 30px; }

        /* --- DROPDOWN --- */
        .nav-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn {
            background: rgba(0,0,0,0.6); color: var(--neon); padding: 12px 25px;
            font-weight: bold; border: 1px solid var(--neon); border-radius: 4px; cursor: pointer;
        }
        .dropdown-content {
            display: none; position: absolute; background-color: #111; min-width: 180px;
            z-index: 100; border: 1px solid var(--neon);
        }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; border-bottom: 1px solid #222; }
        .dropdown-content a:hover { background: var(--neon); color: black; }
        .dropdown:hover .dropdown-content { display: block; }

        /* --- SECTION DATABASE --- */
        #databaseSection { display: none; background: rgba(0,0,0,0.95); padding: 20px; min-height: 100vh; }
        
        /* PERBAIKAN LEBAR KOLOM DI SINI */
        .table-wrapper { 
            overflow: auto; 
            max-height: 85vh; 
            border: 1px solid #333;
        }
        table { 
            border-collapse: collapse; 
            width: auto; /* Agar lebar tabel mengikuti konten, bukan dipaksa 100% */
            min-width: 100%;
            font-size: 11px; 
        }
        th { 
            background: var(--neon); 
            color: #000; 
            padding: 10px 15px; 
            position: sticky; 
            top: 0; 
            white-space: nowrap; /* Mencegah nama kolom turun ke bawah */
            text-align: left;
        }
        td { 
            padding: 8px 15px; 
            border-bottom: 1px solid #222; 
            white-space: nowrap; /* Data tetap satu baris */
            color: #ccc;
        }
        tr:hover { background: #1a1a1a; }
        .img-preview { height: 40px; border-radius: 4px; display: block; }

        .btn-back { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header id="homeHeader">
        <h1>FISH APP-V3</h1>
        <div class="subtitle">Advanced Management System for Fish & Coral</div>
        <div class="nav-container">
            <div class="dropdown">
                <button class="dropbtn">📁 DATABASE ▾</button>
                <div class="dropdown-content">
                    <a href="#" onclick="showDatabase()">Master Data Ikan</a>
                    <a href="#">Data Supplier</a>
                    <a href="#">Customer</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">🚢 PEMBELIAN ▾</button>
                <div class="dropdown-content">
                    <a href="#">Nota</a>
                    <a href="#">Stok List Wild</a>
                    <a href="#">Stok List Culture</a>
                </div>
            </div>
        </div>
    </header>

    <section id="databaseSection">
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
            <button onclick="goHome()" class="btn-back">⬅ KEMBALI</button>
            <input type="text" id="searchInput" placeholder="Cari data..." style="flex:1; padding:10px; background:#000; color:var(--neon); border:1px solid #333;">
        </div>
        <div id="loader" style="text-align: center; color: var(--neon); display: none;">⚡ LOADING DATA...</div>
        <div class="table-wrapper" id="tableContainer"></div>
    </section>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyiYKUhecGfXLaOLRn5lW3qIgBdh1F0PHTOEvcel72wxXiXXzHdaQV_201Jixmb4be3/exec"; // GANTI DENGAN URL /exec ANDA

        function showDatabase() {
            document.getElementById('homeHeader').style.display = 'none';
            document.getElementById('databaseSection').style.display = 'block';
            document.body.style.backgroundImage = "none";
            loadData();
        }

        function goHome() { location.reload(); }

        async function loadData() {
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            try {
                const response = await fetch(`${API_URL}?action=getFish`);
                const rows = await response.json();
                window.allData = rows;
                renderTable(rows);
            } catch (err) {
                console.error(err);
            }
            loader.style.display = 'none';
        }

        function renderTable(rows) {
            if (!rows) return;
            let html = "<table><thead><tr>";
            rows[0].forEach(h => html += `<th>${h}</th>`);
            html += "</tr></thead><tbody>";

            for(let i=1; i < Math.min(rows.length, 500); i++) {
                html += "<tr>";
                rows[i].forEach((cell, j) => {
                    let content = cell;
                    if (String(cell).includes("http")) {
                        content = `<img src="${cell}" class="img-preview">`;
                    }
                    html += `<td>${content}</td>`;
                });
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById('tableContainer').innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const val = e.target.value.toLowerCase();
            const filtered = [window.allData[0], ...window.allData.slice(1).filter(r => 
                r.some(c => String(c).toLowerCase().includes(val))
            )];
            renderTable(filtered);
        });
    </script>
</body>
</html>
