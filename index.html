<style>
    :root { --neon: #00d2ff; --bg: #0b0b0b; --accent: #ff4444; --dark-grey: #121212; }
    
    body { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        background: var(--bg); 
        color: #efefef; 
        margin: 0;
        padding: 0; /* Pastikan nol */
        overflow-x: hidden;
    }

    /* --- HEADER --- */
    header { text-align: center; padding: 20px 10px; background: #000; border-bottom: 1px solid #222; }
    h1 { font-size: 28px; letter-spacing: 4px; color: #fff; margin: 0; text-shadow: 0 0 10px var(--neon); }
    .subtitle { color: var(--neon); font-size: 10px; margin-bottom: 15px; letter-spacing: 1px; }

    .nav-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
    .dropdown { position: relative; display: inline-block; }
    .dropbtn {
        background: rgba(0,0,0,0.8); color: var(--neon); padding: 6px 12px;
        font-weight: bold; border: 1px solid var(--neon); border-radius: 3px; cursor: pointer;
        text-transform: uppercase; font-size: 10px; display: flex; align-items: center; gap: 5px;
    }
    .dropdown-content {
        display: none; position: absolute; background-color: #111; min-width: 160px;
        z-index: 100; border: 1px solid var(--neon); box-shadow: 0 8px 16px rgba(0,0,0,1);
    }
    .dropdown-content a { color: #ccc; padding: 8px 12px; text-decoration: none; display: block; border-bottom: 1px solid #222; font-size: 11px; }
    .dropdown-content a:hover { background: var(--neon); color: #000; }
    .dropdown:hover .dropdown-content { display: block; }

    /* --- DATABASE SECTION FULL WIDTH --- */
    #databaseSection { display: none; background: #000; min-height: 100vh; padding: 0; } /* Padding 0 agar nempel ke pinggir */
    
    .controls { 
        display: flex; gap: 8px; align-items: center; 
        padding: 5px 10px; background: #080808; border-bottom: 1px solid #222; 
    }
    
    .btn { padding: 5px 10px; border-radius: 2px; border: none; cursor: pointer; font-weight: bold; font-size: 10px; color: white; }
    .btn-home { background: var(--accent); }
    .btn-col { background: #333; border: 1px solid var(--neon); color: var(--neon); }

    #searchInput { flex: 1; padding: 5px; background: #111; color: var(--neon); border: 1px solid #333; border-radius: 2px; font-size: 11px; outline: none; }

    /* --- TABLE SUPER RAPAT & FULL WIDTH --- */
    .table-wrapper { 
        overflow: auto; 
        height: calc(100vh - 50px); /* Sesuaikan tinggi dengan controls */
        width: 100%; /* Full ke kanan kiri */
        margin: 0;
        padding: 0;
    }

    table { 
        border-collapse: collapse; 
        width: 100%; /* Ini yang bikin kanan kiri penuh */
        table-layout: auto; /* Biar kolom menyesuaikan isi secara otomatis tapi tetap penuh */
    }

    th { 
        background: #1a1a1a; color: var(--neon); 
        padding: 4px 6px; 
        position: sticky; top: 0; white-space: nowrap; 
        text-align: left; font-size: 10px; z-index: 10; border: 1px solid #333;
    }

    td { 
        padding: 2px 6px; 
        border: 1px solid #222; 
        white-space: nowrap; 
        font-size: 10px; 
        color: #ddd; 
        line-height: 1.1; 
    }

    tr:nth-child(even) { background: #050505; }
    tr:hover { background: #151515; }
    
    .img-cell { height: 22px; width: auto; border-radius: 1px; vertical-align: middle; }
    .hidden-col { display: none; }

    #loader { text-align: center; color: var(--neon); padding: 50px; display: none; font-size: 12px; }

    /* Panel Kolom melayang agar tidak dorong tabel */
    #columnFilterPanel {
        display: none; position: absolute; top: 40px; left: 10px; 
        background: var(--dark-grey); padding: 10px;
        border: 1px solid var(--neon); z-index: 500; border-radius: 3px;
        max-height: 250px; overflow-y: auto; box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .filter-item { display: block; margin-bottom: 5px; font-size: 10px; cursor: pointer; color: #aaa; }
</style>
