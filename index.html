<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH APP-V3 | Fixed Resize</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #0b0b0b; --accent: #ff4444; }
        body { font-family: sans-serif; background: var(--bg); color: #efefef; margin: 0; overflow-x: hidden; }

        /* --- TABLE STYLE --- */
        #databaseSection { display: none; width: 100vw; }
        .table-wrapper { overflow: auto; height: 90vh; width: 100%; }
        
        table { 
            border-collapse: collapse; 
            table-layout: fixed; /* WAJIB FIXED agar lebar kolom bisa dikontrol JS */
            width: max-content; 
            min-width: 100%;
        }

        th { 
            background: #1a1a1a; color: var(--neon); 
            padding: 8px; border: 1px solid #333;
            position: sticky; top: 0; font-size: 11px;
            text-align: left; white-space: nowrap;
            user-select: none;
            position: relative; /* Untuk posisi resizer */
        }

        /* Area sensitif untuk digeser */
        .resizer {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 8px; /* Diperlebar agar lebih mudah diklik */
            cursor: col-resize;
            z-index: 30;
        }
        .resizer:hover { background: var(--neon); }

        td { padding: 5px; border: 1px solid #222; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr:nth-child(even) { background: #050505; }
        
        .controls { display: flex; gap: 10px; padding: 10px; background: #111; }
        .img-cell { height: 25px; width: auto; }
    </style>
</head>
<body>

    <header id="mainHeader" style="text-align:center; padding:20px;">
        <button onclick="openSheet('Master Data Ikan')" style="padding:10px 20px; cursor:pointer;">BUKA DATABASE</button>
    </header>

    <section id="databaseSection">
        <div class="controls">
            <button onclick="goHome()" style="background:red; color:white; border:none; padding:5px 10px;">KEMBALI</button>
            <input type="text" id="searchInput" placeholder="Cari..." style="flex:1;">
        </div>
        <div class="table-wrapper" id="tableContainer"></div>
    </section>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOasisnR1DTEmmsvhLDcNTogQw13f5MkX0U-vUpnHNzWLiSdgO7EisEzM2EgDnYhtP/exec";
        let currentSheet = "";

        async function openSheet(sheetName) {
            currentSheet = sheetName;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('databaseSection').style.display = 'block';
            await loadData(sheetName);
        }

        function goHome() {
            document.getElementById('mainHeader').style.display = 'block';
            document.getElementById('databaseSection').style.display = 'none';
        }

        async function loadData(sheet) {
            const res = await fetch(`${SCRIPT_URL}?action=read&sheet=${sheet}`);
            const result = await res.json();
            if (result.status === "success") {
                renderTable(result.data);
            }
        }

        function renderTable(data) {
            const headers = data[0];
            const savedWidths = JSON.parse(localStorage.getItem('colWidths_' + currentSheet)) || {};

            let html = `<table><thead><tr id="headerRow">`;
            headers.forEach((h, i) => {
                // Gunakan lebar yang tersimpan, atau default 150px
                const w = savedWidths[h] || 150;
                html += `<th style="width: ${w}px;">
                            <span class="title-text">${h}</span>
                            <div class="resizer"></div>
                         </th>`;
            });
            html += `</tr></thead><tbody>`;

            for (let i = 1; i < data.length; i++) {
                html += "<tr>";
                data[i].forEach(cell => {
                    let val = cell || "";
                    if (typeof val === 'string' && val.includes("http")) val = `<img src="${val}" class="img-cell">`;
                    html += `<td>${val}</td>`;
                });
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById('tableContainer').innerHTML = html;

            initResizer();
            
            // Tambahkan fitur pindah kolom (Sortable)
            Sortable.create(document.getElementById('headerRow'), {
                animation: 150,
                handle: '.title-text', // HANYA BISA GESER POSISI JIKA KLIK TEKS (bukan resizer)
            });
        }

        function initResizer() {
            const thEls = document.querySelectorAll("th");
            
            thEls.forEach(th => {
                const resizer = th.querySelector(".resizer");
                
                resizer.addEventListener("mousedown", function(e) {
                    e.preventDefault();
                    e.stopPropagation(); // Mencegah fitur SortableJS ikut aktif

                    const startX = e.pageX;
                    const startWidth = th.offsetWidth;

                    const onMouseMove = (e) => {
                        const newWidth = startWidth + (e.pageX - startX);
                        if (newWidth > 50) {
                            th.style.width = newWidth + "px";
                        }
                    };

                    const onMouseUp = () => {
                        saveWidths();
                        document.removeEventListener("mousemove", onMouseMove);
                        document.removeEventListener("mouseup", onMouseUp);
                    };

                    document.addEventListener("mousemove", onMouseMove);
                    document.addEventListener("mouseup", onMouseUp);
                });
            });
        }

        function saveWidths() {
            const widths = {};
            document.querySelectorAll("th").forEach(th => {
                const name = th.querySelector(".title-text").innerText;
                widths[name] = th.offsetWidth;
            });
            localStorage.setItem('colWidths_' + currentSheet, JSON.stringify(widths));
        }
    </script>
</body>
</html>
