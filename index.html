<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH APP-V3 | Dynamic Management</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #0b0b0b; --accent: #ff4444; --dark-grey: #1a1a1a; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            color: #efefef; 
            margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://images.unsplash.com/photo-1524704659690-3f7a37d9ee23?q=80&w=2070');
            background-size: cover; background-attachment: fixed;
        }

        /* --- NAVIGATION --- */
        header { text-align: center; padding: 20px; }
        .nav-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn {
            background: rgba(0,0,0,0.7); color: var(--neon); padding: 8px 15px;
            border: 1px solid var(--neon); border-radius: 3px; cursor: pointer;
            font-size: 11px; font-weight: bold; text-transform: uppercase;
        }
        .dropdown-content {
            display: none; position: absolute; background: #111; min-width: 180px;
            z-index: 100; border: 1px solid var(--neon);
        }
        .dropdown-content a { color: #ccc; padding: 8px 12px; text-decoration: none; display: block; font-size: 11px; border-bottom: 1px solid #222; }
        .dropdown-content a:hover { background: var(--neon); color: #000; }
        .dropdown:hover .dropdown-content { display: block; }

        /* --- DATABASE VIEW --- */
        #databaseSection { display: none; background: #000; min-height: 100vh; padding: 10px; }
        .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        
        .btn { padding: 6px 12px; border-radius: 3px; border: none; cursor: pointer; font-weight: bold; font-size: 11px; color: white; }
        .btn-home { background: var(--accent); }
        .btn-filter { background: #333; border: 1px solid var(--neon); color: var(--neon); }

        #searchInput { flex: 1; padding: 6px; background: #111; color: var(--neon); border: 1px solid #333; border-radius: 3px; font-size: 11px; }

        /* --- COLUMN FILTER PANEL --- */
        #columnFilterPanel {
            display: none; background: var(--dark-grey); padding: 10px;
            border: 1px solid var(--neon); margin-bottom: 10px; border-radius: 4px;
            max-height: 150px; overflow-y: auto;
        }
        .filter-item { display: inline-flex; align-items: center; margin-right: 15px; font-size: 11px; cursor: pointer; }
        .filter-item input { margin-right: 5px; }

        /* --- TABLE STYLE (ULTRA COMPACT) --- */
        .table-wrapper { overflow: auto; height: 82vh; border: 1px solid #222; position: relative; }
        table { border-collapse: collapse; width: auto; min-width: 100%; }
        
        th { 
            background: #222; color: var(--neon); padding: 6px 10px; 
            position: sticky; top: 0; white-space: nowrap; font-size: 11px; 
            z-index: 10; border: 1px solid #333; cursor: grab; /* Cursor geser */
        }
        th:active { cursor: grabbing; }
        
        td { padding: 4px 10px; border: 1px solid #222; white-space: nowrap; font-size: 10.5px; color: #ddd; }
        tr:hover { background: #111; }
        .img-cell { height: 30px; border-radius: 2px; }

        .hidden-col { display: none; }
        #loader { text-align: center; color: var(--neon); padding: 50px; }
    </style>
</head>
<body>

    <header id="homeHeader">
        <h1 style="text-shadow: 0 0 10px var(--neon);">FISH APP-V3</h1>
        <div class="nav-container">
            <div class="dropdown">
                <button class="dropbtn">📁 DATABASE ▾</button>
                <div class="dropdown-content">
                    <a href="#" onclick="openSheet('User')">User</a>
                    <a href="#" onclick="openSheet('Customer')">Customer</a>
                    <a href="#" onclick="openSheet('Data Supplier')">Data Supplier</a>
                    <a href="#" onclick="openSheet('Harga Supplier')">Harga Supplier</a>
                    <a href="#" onclick="openSheet('Master Data Ikan')">Master Data Ikan</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn">🚢 PEMBELIAN ▾</button>
                <div class="dropdown-content">
                    <a href="#" onclick="openSheet('Nota')">Nota</a>
                    <a href="#" onclick="openSheet('Pembelian Ikan')">Pembelian Ikan</a>
                </div>
            </div>
        </div>
    </header>

    <section id="databaseSection">
        <div class="controls">
            <button onclick="goHome()" class="btn btn-home">⬅ HOME</button>
            <button onclick="toggleFilterPanel()" class="btn btn-filter">⚙️ COLUMNS</button>
            <input type="text" id="searchInput" placeholder="Search data...">
        </div>

        <div id="columnFilterPanel">
            <div style="font-size: 10px; margin-bottom: 5px; color: var(--neon);">Tampilkan/Sembunyikan Kolom:</div>
            <div id="filterCheckboxes"></div>
        </div>
        
        <div id="loader" style="display:none;"><h2>⚡ LOADING...</h2></div>
        <div class="table-wrapper" id="tableContainer"></div>
    </section>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOasisnR1DTEmmsvhLDcNTogQw13f5MkX0U-vUpnHNzWLiSdgO7EisEzM2EgDnYhtP/exec";
        let rawData = [];
        let headers = [];
        let visibleColumns = [];

        async function openSheet(name) {
            document.getElementById('homeHeader').style.display = 'none';
            document.getElementById('databaseSection').style.display = 'block';
            document.getElementById('tableContainer').innerHTML = "";
            document.getElementById('filterCheckboxes').innerHTML = "";
            await loadData(name);
        }

        function goHome() {
            document.getElementById('homeHeader').style.display = 'block';
            document.getElementById('databaseSection').style.display = 'none';
            document.getElementById('columnFilterPanel').style.display = 'none';
        }

        async function loadData(sheet) {
            document.getElementById('loader').style.display = 'block';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&sheet=${sheet}`);
                const json = await res.json();
                if (json.status === "success") {
                    rawData = json.data;
                    headers = rawData[0];
                    visibleColumns = headers.map((_, i) => i); // Awalnya semua kolom tampil
                    createFilterCheckboxes();
                    renderDynamicTable();
                }
            } catch (e) { alert("Error loading data"); }
            document.getElementById('loader').style.display = 'none';
        }

        function createFilterCheckboxes() {
            const container = document.getElementById('filterCheckboxes');
            headers.forEach((h, i) => {
                const label = document.createElement('label');
                label.className = 'filter-item';
                label.innerHTML = `<input type="checkbox" checked onchange="toggleColumn(${i}, this.checked)"> ${h}`;
                container.appendChild(label);
            });
        }

        function toggleColumn(index, isVisible) {
            if (isVisible) {
                if (!visibleColumns.includes(index)) visibleColumns.push(index);
            } else {
                visibleColumns = visibleColumns.filter(i => i !== index);
            }
            renderDynamicTable();
        }

        function toggleFilterPanel() {
            const panel = document.getElementById('columnFilterPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function renderDynamicTable() {
            const container = document.getElementById('tableContainer');
            let html = `<table id="mainTable"><thead><tr id="headerRow">`;
            
            headers.forEach((h, i) => {
                const hideClass = visibleColumns.includes(i) ? "" : "hidden-col";
                html += `<th class="${hideClass}" data-col-index="${i}">${h}</th>`;
            });
            
            html += `</tr></thead><tbody>`;

            for (let r = 1; r < rawData.length; r++) {
                html += `<tr>`;
                rawData[r].forEach((cell, i) => {
                    const hideClass = visibleColumns.includes(i) ? "" : "hidden-col";
                    let val = cell || "";
                    if (typeof val === 'string' && val.includes("http")) {
                        val = `<img src="${val}" class="img-cell" onerror="this.parentElement.innerHTML='No Image'">`;
                    }
                    html += `<td class="${hideClass}">${val}</td>`;
                });
                html += `</tr>`;
            }
            html += `</tbody></table>`;
            container.innerHTML = html;

            // Aktifkan fitur Geser Kolom (Drag & Drop)
            const el = document.getElementById('headerRow');
            Sortable.create(el, {
                animation: 150,
                onEnd: function () {
                    // Fitur ini bisa dikembangkan untuk menyimpan urutan kolom, 
                    // namun secara visual kolom sudah bisa digeser.
                }
            });
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const rows = document.querySelectorAll("#mainTable tbody tr");
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(val) ? "" : "none";
            });
        });
    </script>
</body>
</html>
