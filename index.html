<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH APP-V3 | Ultra Compact & Resizable</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #0b0b0b; --accent: #ff4444; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: #efefef; margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- HEADER & NAV (Tetap Sama) --- */
        header { text-align: center; padding: 10px; background: #000; border-bottom: 1px solid #222; }
        h1 { font-size: 20px; color: #fff; margin: 0; text-shadow: 0 0 10px var(--neon); }
        .subtitle { color: var(--neon); font-size: 9px; margin-bottom: 8px; }
        .nav-container { display: flex; justify-content: center; gap: 5px; }
        .dropbtn { 
            background: #000; color: var(--neon); padding: 4px 8px; 
            border: 1px solid var(--neon); font-size: 9px; cursor: pointer; 
        }

        /* --- DATABASE SECTION --- */
        #databaseSection { display: none; background: #000; width: 100%; }
        .controls { display: flex; gap: 8px; padding: 4px 10px; background: #080808; border-bottom: 1px solid #222; }
        #searchInput { flex: 1; padding: 4px; background: #111; color: var(--neon); border: 1px solid #333; font-size: 10px; }

        /* --- TABLE ULTRA COMPACT & RESIZABLE --- */
        .table-wrapper { 
            overflow: auto; 
            height: calc(100vh - 45px); 
            width: 100%; 
        }

        table { 
            border-collapse: collapse; 
            table-layout: fixed; /* WAJIB agar kolom bisa dipaksa resize */
            width: max-content; 
            min-width: 100%; 
        }

        th { 
            background: var(--neon); /* Warna biru neon seperti gambar */
            color: #000; 
            padding: 4px 8px; 
            position: sticky; 
            top: 0; 
            white-space: nowrap; 
            text-align: left; 
            font-size: 10px; 
            z-index: 10; 
            border: 1px solid #000;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative; /* Wajib untuk posisi resizer */
        }

        /* RESIZER HANDLE */
        .resizer {
            width: 6px;
            height: 100%;
            position: absolute;
            right: 0;
            top: 0;
            cursor: col-resize;
            user-select: none;
            z-index: 11;
        }
        .resizer:hover { background: rgba(0,0,0,0.2); }

        td { 
            padding: 2px 5px; 
            border: 1px solid #222; 
            white-space: nowrap; 
            font-size: 9.5px; 
            color: #ddd; 
            line-height: 1.1; 
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr:nth-child(even) { background: #050505; }
        tr:hover { background: #151515; }
        .hidden-col { display: none; }
        .img-cell { height: 18px; border-radius: 1px; }

        #columnFilterPanel {
            display: none; position: absolute; top: 40px; left: 10px; 
            background: #111; border: 1px solid var(--neon); z-index: 500;
            padding: 10px; max-height: 300px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- Header & Nav tetap sama dengan script Anda sebelumnya -->
    <header id="mainHeader">
        <h1>FISH APP-V3</h1>
        <div class="subtitle">Advanced Management System</div>
        <div class="nav-container">
            <div class="dropdown">
                <button class="dropbtn" onclick="openSheet('Master Data Ikan')">📂 DATABASE ▾</button>
            </div>
            <!-- ... Nav lainnya ... -->
        </div>
    </header>

    <section id="databaseSection">
        <div class="controls">
            <button onclick="goHome()" style="background:var(--accent); color:white; border:none; padding:4px 8px; font-size:9px;">⬅ KEMBALI</button>
            <button onclick="toggleFilterPanel()" style="background:#333; color:var(--neon); border:1px solid var(--neon); padding:4px 8px; font-size:9px;">⚙️ KOLOM</button>
            <input type="text" id="searchInput" placeholder="Cari data...">
        </div>

        <div id="columnFilterPanel"><div id="filterCheckboxes"></div></div>
        <div class="table-wrapper" id="tableContainer"></div>
    </section>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOasisnR1DTEmmsvhLDcNTogQw13f5MkX0U-vUpnHNzWLiSdgO7EisEzM2EgDnYhtP/exec"; 
        let rawData = [];
        let headers = [];
        let visibleColumns = [];

        async function openSheet(sheetName) {
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('databaseSection').style.display = 'block';
            await loadData(sheetName);
        }

        function goHome() {
            document.getElementById('mainHeader').style.display = 'block';
            document.getElementById('databaseSection').style.display = 'none';
        }

        async function loadData(sheet) {
            const container = document.getElementById('tableContainer');
            container.innerHTML = "<p style='color:var(--neon); padding:10px;'>⚡ LOADING...</p>";
            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&sheet=${sheet}`);
                const result = await res.json();
                if (result.status === "success") {
                    rawData = result.data;
                    headers = rawData[0];
                    visibleColumns = headers.map((_, i) => i);
                    createFilterCheckboxes();
                    renderTable();
                }
            } catch (e) { container.innerHTML = "Error loading data."; }
        }

        function renderTable() {
            if (rawData.length === 0) return;
            let html = `<table><thead><tr id="headerRow">`;
            
            headers.forEach((h, i) => {
                const hide = visibleColumns.includes(i) ? "" : "hidden-col";
                // Ditambahkan class resizer dan lebar default kecil
                html += `<th class="${hide}" style="width: 80px;">
                            ${h}
                            <div class="resizer"></div>
                         </th>`;
            });
            
            html += `</tr></thead><tbody>`;

            for (let i = 1; i < rawData.length; i++) {
                html += "<tr>";
                rawData[i].forEach((cell, idx) => {
                    const hide = visibleColumns.includes(idx) ? "" : "hidden-col";
                    let val = cell || "";
                    if (typeof val === 'string' && val.includes("http")) {
                        val = `<img src="${val}" class="img-cell" onerror="this.parentElement.innerHTML='No Image'">`;
                    }
                    html += `<td class="${hide}">${val}</td>`;
                });
                html += "</tr>";
            }
            html += "</tbody></table>";
            document.getElementById('tableContainer').innerHTML = html;
            
            initResizable(); // AKTIFKAN FITUR RESIZE
            Sortable.create(document.getElementById('headerRow'), { animation: 150 });
        }

        // FUNGSI RESIZE LOGIC
        function initResizable() {
            const ths = document.querySelectorAll('th');
            ths.forEach(th => {
                const resizer = th.querySelector('.resizer');
                if (!resizer) return;

                resizer.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    const startX = e.pageX;
                    const startWidth = th.offsetWidth;

                    const onMouseMove = (e) => {
                        const newWidth = startWidth + (e.pageX - startX);
                        if (newWidth > 20) { 
                            th.style.width = newWidth + 'px';
                        }
                    };

                    const onMouseUp = () => {
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                    };

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
            });
        }

        function createFilterCheckboxes() {
            const container = document.getElementById('filterCheckboxes');
            container.innerHTML = "";
            headers.forEach((h, i) => {
                const label = document.createElement('label');
                label.style.display = "block";
                label.style.fontSize = "10px";
                label.innerHTML = `<input type="checkbox" checked onchange="toggleColumn(${i}, this.checked)"> ${h}`;
                container.appendChild(label);
            });
        }

        function toggleColumn(index, isVisible) {
            if (isVisible) { if (!visibleColumns.includes(index)) visibleColumns.push(index); } 
            else { visibleColumns = visibleColumns.filter(i => i !== index); }
            renderTable();
        }

        function toggleFilterPanel() {
            const panel = document.getElementById('columnFilterPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const rows = document.querySelectorAll("table tbody tr");
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
            });
        });
    </script>
</body>
</html>
