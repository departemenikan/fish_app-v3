<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0b0b">
    <title>FISH APP-V3 | High Performance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00d2ff; --bg: #0b0b0b; --accent: #ff4444; --green: #00ff88; }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #efefef; margin: 0; padding: 0; overflow-x: hidden; touch-action: manipulation; }
        
        /* Header & Nav */
        header { text-align: center; padding: 15px 10px; background: #000; border-bottom: 1px solid #222; }
        h1 { font-size: 26px; letter-spacing: 3px; color: #fff; margin: 0; text-shadow: 0 0 10px var(--neon); }
        .subtitle { color: var(--neon); font-size: 9px; margin-bottom: 12px; letter-spacing: 1px; }
        .nav-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; }
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: rgba(0,0,0,0.8); color: var(--neon); padding: 5px 10px; font-weight: bold; border: 1px solid var(--neon); border-radius: 3px; cursor: pointer; text-transform: uppercase; font-size: 10px; display: flex; align-items: center; gap: 5px; }
        .dropdown-content { display: none; position: absolute; background-color: #111; min-width: 170px; z-index: 100; border: 1px solid var(--neon); box-shadow: 0 8px 16px rgba(0,0,0,1); }
        .dropdown-content a { color: #ccc; padding: 8px 12px; text-decoration: none; display: block; border-bottom: 1px solid #222; font-size: 10px; }
        .dropdown-content a:hover { background: var(--neon); color: #000; }
        .dropdown:hover .dropdown-content { display: block; }

        /* Dashboard & Layout */
        #databaseSection { display: none; background: #000; height: 100vh; width: 100%; }
        .controls { display: flex; gap: 8px; align-items: center; padding: 6px 15px; background: #080808; border-bottom: 1px solid #222; flex-wrap: wrap; }
        .btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; color: white; transition: all 0.2s ease; }
        
        /* FEATURE: RESIZABLE SIDEBAR */
        .database-layout { display: flex; height: calc(100vh - 130px); overflow: hidden; position: relative; }
        .side-list { width: 180px; min-width: 50px; border-right: 1px solid #222; overflow-y: auto; background: #050505; }
        .side-detail { flex: 1; overflow: auto; background: #000; position: relative; }
        
        /* Garis Pemisah (Resizer) */
        .sidebar-resizer {
            width: 6px;
            cursor: col-resize;
            background: #1a1a1a;
            position: relative;
            z-index: 20;
            transition: background 0.3s;
        }
        .sidebar-resizer:hover, .sidebar-resizer:active { background: var(--neon); }

        /* List & Table Style */
        .supplier-card { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; font-size: 10px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .supplier-card:hover { background: #111; color: var(--neon); }
        .supplier-card.active { background: #111; color: var(--neon); border-left: 3px solid var(--neon); font-weight: bold; }
        .all-card { color: var(--green); border-bottom: 2px solid #222; font-weight: bold; }

        table { border-collapse: collapse; table-layout: fixed; width: max-content; }
        th { background: #1a1a1a; color: var(--neon); padding: 8px 4px; position: sticky; top: 0; text-align: center; font-size: 10px; z-index: 10; border: 1px solid #2a2a2a; overflow: hidden; white-space: nowrap; }
        td { padding: 6px 4px; border: 1px solid #1a1a1a; font-size: 10px; color: #ccc; vertical-align: middle; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        
        /* Column Resizer */
        .resizer { position: absolute; right: 0; top: 0; width: 8px; height: 100%; cursor: col-resize; z-index: 11; }
        .resizer:hover { background: var(--neon); opacity: 0.5; }

        tr.selected-row { background: rgba(0, 210, 255, 0.15) !important; }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--neon); z-index: 9000; background: rgba(0,0,0,0.9); padding: 20px; border: 1px solid var(--neon); display: none; font-size: 12px; }
        
        /* Home Logo */
        #homePageContent { height: calc(100vh - 105px); width: 100%; display: flex; justify-content: center; align-items: flex-start; background: #000; overflow: hidden; }
        .home-logo { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }

        /* Buttons color */
        .btn-home { background: var(--accent); }
        .btn-add { background: var(--green); color: #000; }
        .btn-edit { background: var(--neon); color: #000; }
        .btn-delete { background: #ff1111; color: white; }
        .btn-col { background: #222; border: 1px solid var(--neon); color: var(--neon); }
        .btn-reset { background: #1a1a1a; border: 1px solid #444; color: #888; }
        
        /* Search */
        #searchInput { width: 150px; padding: 6px 10px; background: #111; color: var(--neon); border: 1px solid #333; border-radius: 4px; font-size: 10px; outline: none; }
        #rowCounter { font-size: 10px; color: #777; margin-right: 10px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; }
        .modal-content { background: #111; border: 1px solid var(--neon); width: 90%; max-width: 450px; margin: 20px auto; padding: 25px; border-radius: 8px; max-height: 85vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 10px; color: var(--neon); margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 8px; background: #000; border: 1px solid #333; color: #fff; font-size: 11px; }
    </style>
</head>
<body>

<div id="loader">⚡ LOADING...</div>

<header id="mainHeader">
    <h1>FISH APP-V3</h1>
    <div class="subtitle">Sistem Management Inventory Ikan</div>
    <div class="nav-container">
        <div class="dropdown">
            <button class="dropbtn">📁 DATABASE ▾</button>
            <div class="dropdown-content">
                <a href="#" onclick="openSheet('User')">User</a>
                <a href="#" onclick="openSheet('Customer')">Customer</a>
                <a href="#" onclick="openSheet('Data Supplier')">Data Supplier</a>
                <a href="#" onclick="openSheet('Harga Supplier')">Harga Supplier</a>
                <a href="#" onclick="openSheet('Master Data Ikan')">Master Data Ikan</a>
            </div>
        </div>
        <div class="dropdown"><button class="dropbtn">🚢 PEMBELIAN ▾</button></div>
        <div class="dropdown"><button class="dropbtn">✈️ PENGIRIMAN ▾</button></div>
        <div class="dropdown"><button class="dropbtn">📊 STOK ▾</button></div>
    </div>
</header>

<section id="homePageContent">
    <img src="Home_Image.png" alt="Fish App Logo" class="home-logo">
</section>

<section id="databaseSection">
    <div class="controls">
        <button onclick="goHome()" class="btn btn-home"><i class="fas fa-home"></i></button>
        <button onclick="openModal('add')" class="btn btn-add"><i class="fas fa-plus"></i></button>
        <button onclick="openModal('edit')" class="btn btn-edit"><i class="fas fa-pen"></i></button>
        <button onclick="handleDelete()" class="btn btn-delete"><i class="fas fa-trash-alt"></i></button> 
        <button onclick="resetWidths()" class="btn btn-reset" title="Reset View"><i class="fas fa-sync-alt"></i></button>
        <span style="flex:1"></span>
        <span id="rowCounter"></span>
        <input type="search" id="searchInput" placeholder="Cari...">
    </div>
    
    <div id="tableContainer"></div>
</section>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfCYQJGcR7IUY6QvnnCKritz0MTqKTgYfFd63jcznQhktCEUmg1jjnGbvcsSId661Q1A/exec";

let rawData = [], headers = [], visibleColumns = [], colWidths = [];
let filteredIndices = [], currentSheet = "", selectedRowIndex = null, searchQuery = "";
let sidebarWidth = 160; // Default sidebar width

function showLoader() { document.getElementById('loader').style.display = 'block'; }
function hideLoader() { document.getElementById('loader').style.display = 'none'; }

async function openSheet(sheetName) {
    currentSheet = sheetName;
    selectedRowIndex = null;
    showLoader();
    document.getElementById('mainHeader').style.display = 'none';
    document.getElementById('homePageContent').style.display = 'none';
    document.getElementById('databaseSection').style.display = 'block';
    await loadData(sheetName);
}

function goHome() { 
    document.getElementById('mainHeader').style.display = 'block'; 
    document.getElementById('homePageContent').style.display = 'flex'; 
    document.getElementById('databaseSection').style.display = 'none'; 
}

async function loadData(sheet) {
    try {
        const res = await fetch(`${SCRIPT_URL}?action=read&sheet=${encodeURIComponent(sheet)}`);
        const result = await res.json();
        if (result.status === 'success') {
            rawData = result.data;
            headers = rawData[0];
            visibleColumns = headers.map((_, i) => i);
            computeDefaultWidths();
            rebuildFilteredIndices();
            buildLayout();
        }
    } catch(e) { alert('Gagal memuat data.'); }
    hideLoader();
}

function computeDefaultWidths() {
    colWidths = headers.map(h => 100); // Default 100px per kolom
}

function rebuildFilteredIndices() {
    const q = searchQuery.toLowerCase();
    filteredIndices = [];
    for (let r = 1; r < rawData.length; r++) {
        if (!q || rawData[r].some(c => String(c).toLowerCase().includes(q))) filteredIndices.push(r);
    }
    document.getElementById('rowCounter').textContent = filteredIndices.length + " baris";
}

function buildLayout() {
    const container = document.getElementById('tableContainer');
    container.innerHTML = '';

    const layout = document.createElement('div');
    layout.className = 'database-layout';

    // Sidebar
    const sideList = document.createElement('div');
    sideList.className = 'side-list';
    sideList.id = 'sideList';
    sideList.style.width = sidebarWidth + 'px';

    // Resizer Sidebar
    const resizer = document.createElement('div');
    resizer.className = 'sidebar-resizer';
    resizer.addEventListener('mousedown', initSidebarResize);
    resizer.addEventListener('touchstart', initSidebarResize);

    // Main Table Area
    const sideDetail = document.createElement('div');
    sideDetail.className = 'side-detail';
    sideDetail.id = 'tableWrapper';

    layout.appendChild(sideList);
    layout.appendChild(resizer);
    layout.appendChild(sideDetail);
    container.appendChild(layout);

    renderSupplierList();
    renderTable('ALL');
}

// FUNGSI GESER SIDEBAR
function initSidebarResize(e) {
    e.preventDefault();
    const startX = e.type === 'mousedown' ? e.pageX : e.touches[0].pageX;
    const startWidth = sidebarWidth;

    const doResize = (m) => {
        const currentX = m.type === 'mousemove' ? m.pageX : m.touches[0].pageX;
        sidebarWidth = Math.max(50, startWidth + (currentX - startX));
        document.getElementById('sideList').style.width = sidebarWidth + 'px';
    };

    const stopResize = () => {
        window.removeEventListener('mousemove', doResize);
        window.removeEventListener('mouseup', stopResize);
        window.removeEventListener('touchmove', doResize);
        window.removeEventListener('touchend', stopResize);
    };

    window.addEventListener('mousemove', doResize);
    window.addEventListener('mouseup', stopResize);
    window.addEventListener('touchmove', doResize);
    window.addEventListener('touchend', stopResize);
}

function renderSupplierList() {
    const sideList = document.getElementById('sideList');
    sideList.innerHTML = '';

    const allBtn = document.createElement('div');
    allBtn.className = 'supplier-card all-card active';
    allBtn.innerHTML = '<i class="fas fa-list"></i> &nbsp; ALL SUPPLIERS';
    allBtn.onclick = () => {
        document.querySelectorAll('.supplier-card').forEach(el => el.classList.remove('active'));
        allBtn.classList.add('active');
        renderTable('ALL');
    };
    sideList.appendChild(allBtn);

    const suppliers = [...new Set(rawData.slice(1).map(r => r[1]))].sort();
    suppliers.forEach(sup => {
        const div = document.createElement('div');
        div.className = 'supplier-card';
        div.innerText = sup;
        div.onclick = () => {
            document.querySelectorAll('.supplier-card').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            renderTable(sup);
        };
        sideList.appendChild(div);
    });
}

function renderTable(filterName) {
    const wrapper = document.getElementById('tableWrapper');
    wrapper.innerHTML = '';

    const tbl = document.createElement('table');
    
    // Create Colgroup for resizing
    const colGroup = document.createElement('colgroup');
    const selCol = document.createElement('col'); selCol.style.width = '40px'; 
    colGroup.appendChild(selCol);

    headers.forEach((_, i) => {
        const col = document.createElement('col');
        col.style.width = colWidths[i] + 'px';
        colGroup.appendChild(col);
    });
    tbl.appendChild(colGroup);

    // Header
    const thead = document.createElement('thead');
    const hRow = document.createElement('tr');
    
    const thSel = document.createElement('th'); thSel.innerText = 'SEL'; hRow.appendChild(thSel);
    
    headers.forEach((h, i) => {
        const th = document.createElement('th');
        th.innerHTML = `<span>${h}</span><div class="resizer" data-col="${i}"></div>`;
        
        // Event Listener Resize Kolom
        const resizer = th.querySelector('.resizer');
        resizer.addEventListener('mousedown', initColResize);
        resizer.addEventListener('touchstart', initColResize);

        hRow.appendChild(th);
    });
    thead.appendChild(hRow);
    tbl.appendChild(thead);

    // Body
    const tbody = document.createElement('tbody');
    const displayRows = filterName === 'ALL' ? filteredIndices : filteredIndices.filter(idx => rawData[idx][1] === filterName);

    displayRows.forEach(idx => {
        const tr = document.createElement('tr');
        tr.onclick = () => selectRow(idx, tr);
        if (selectedRowIndex === idx) tr.classList.add('selected-row');

        const tdRadio = document.createElement('td');
        tdRadio.style.textAlign = 'center';
        tdRadio.innerHTML = `<input type="radio" name="rowSel" ${selectedRowIndex === idx ? 'checked' : ''}>`;
        tr.appendChild(tdRadio);

        rawData[idx].forEach(cell => {
            const td = document.createElement('td');
            td.innerText = cell ?? '';
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    
    tbl.appendChild(tbody);
    wrapper.appendChild(tbl);
}

// FUNGSI GESER KOLOM TABEL
function initColResize(e) {
    e.preventDefault();
    const colIdx = parseInt(this.getAttribute('data-col'));
    const startX = e.type === 'mousedown' ? e.pageX : e.touches[0].pageX;
    const startWidth = colWidths[colIdx];
    const colEl = document.querySelectorAll('colgroup col')[colIdx + 1];

    const doResize = (m) => {
        const currentX = m.type === 'mousemove' ? m.pageX : m.touches[0].pageX;
        const newWidth = Math.max(30, startWidth + (currentX - startX));
        colWidths[colIdx] = newWidth;
        colEl.style.width = newWidth + 'px';
    };

    const stopResize = () => {
        window.removeEventListener('mousemove', doResize);
        window.removeEventListener('mouseup', stopResize);
        window.removeEventListener('touchmove', doResize);
        window.removeEventListener('touchend', stopResize);
    };

    window.addEventListener('mousemove', doResize);
    window.addEventListener('mouseup', stopResize);
    window.addEventListener('touchmove', doResize);
    window.addEventListener('touchend', stopResize);
}

function selectRow(idx, tr) {
    document.querySelectorAll('tr').forEach(r => r.classList.remove('selected-row'));
    tr.classList.add('selected-row');
    tr.querySelector('input').checked = true;
    selectedRowIndex = idx;
}

function resetWidths() {
    computeDefaultWidths();
    sidebarWidth = 160;
    buildLayout();
}

document.getElementById('searchInput').oninput = function() {
    searchQuery = this.value;
    rebuildFilteredIndices();
    const activeSup = document.querySelector('.supplier-card.active').innerText;
    renderTable(activeSup.includes('ALL') ? 'ALL' : activeSup);
};
</script>
</body>
</html>
