<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH APP-V3 | Ultra Tight Table</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #000; --accent: #ff4444; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- MENU TETAP LENGKAP --- */
        header { text-align: center; padding: 15px 0; border-bottom: 1px solid #222; }
        h1 { font-size: 24px; letter-spacing: 3px; margin: 0; text-shadow: 0 0 8px var(--neon); }
        .nav-container { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .dropbtn {
            background: #111; color: var(--neon); padding: 5px 10px;
            border: 1px solid var(--neon); font-size: 10px; cursor: pointer;
        }

        /* --- DATABASE SECTION FULL SCREEN --- */
        #databaseSection { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #000; z-index: 1000; }
        
        /* Toolbar sangat rapat */
        .controls { 
            display: flex; gap: 5px; align-items: center; 
            padding: 3px 5px; background: #111; border-bottom: 1px solid #333; 
        }
        
        .btn { padding: 4px 8px; font-size: 9px; cursor: pointer; border: none; font-weight: bold; }
        .btn-home { background: var(--accent); color: #fff; }
        .btn-col { background: #222; color: var(--neon); border: 1px solid var(--neon); }
        #searchInput { flex: 1; padding: 4px; background: #000; color: #0f0; border: 1px solid #333; font-size: 10px; }

        /* --- TABEL SUPER RAPAT TANPA MARGIN (SS 67 OPTIMIZED) --- */
        .table-wrapper { 
            width: 100%; 
            height: calc(100vh - 35px); 
            overflow: auto;
            margin: 0; padding: 0; /* Menghilangkan celah kanan kiri */
        }

        table { 
            border-collapse: collapse; 
            width: 100%; /* Memaksa tabel mengisi seluruh lebar layar */
            table-layout: auto; 
        }

        th { 
            background: #1a1a1a; color: var(--neon); 
            padding: 2px 4px; /* Sangat tipis */
            position: sticky; top: 0; z-index: 10;
            border: 1px solid #333; font-size: 9px;
            text-align: left; white-space: nowrap;
        }

        td { 
            padding: 1px 4px; /* Lebar sel dipersempit maksimal */
            border: 1px solid #222; 
            font-size: 9.5px; 
            color: #ccc; 
            white-space: nowrap; 
            line-height: 1.1;
        }

        tr:nth-child(even) { background: #080808; }
        tr:hover { background: #151515; }

        /* Gambar mini agar baris tidak bengkak */
        .img-cell { height: 16px; width: auto; vertical-align: middle; }
        .hidden-col { display: none; }

        /* Panel Kolom */
        #columnFilterPanel {
            display: none; position: absolute; top: 35px; left: 5px; 
            background: #111; border: 1px solid var(--neon); z-index: 2000;
            padding: 10px; max-height: 70vh; overflow-y: auto; font-size: 10px;
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <h1>FISH APP-V3</h1>
        <div class="nav-container">
            <button class="dropbtn" onclick="openSheet('User')">DATABASE</button>
            <button class="dropbtn" onclick="openSheet('Nota')">PEMBELIAN</button>
            <button class="dropbtn" onclick="openSheet('Invoice')">PENGIRIMAN</button>
            <button class="dropbtn" onclick="openSheet('Rekap Stok')">STOK</button>
        </div>
    </header>

    <section id="databaseSection">
        <div class="controls">
            <button onclick="goHome()" class="btn btn-home">KEMBALI</button>
            <button onclick="toggleFilterPanel()" class="btn btn-col">KOLOM</button>
            <input type="text" id="searchInput" placeholder="Cari data...">
        </div>

        <div id="columnFilterPanel">
            <div id="filterCheckboxes"></div>
        </div>
        
        <div class="table-wrapper">
            <table id="mainTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </section>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOasisnR1DTEmmsvhLDcNTogQw13f5MkX0U-vUpnHNzWLiSdgO7EisEzM2EgDnYhtP/exec";
        let rawData = [];
        let headers = [];
        let visibleColumns = [];

        async function openSheet(sheetName) {
            document.getElementById('databaseSection').style.display = 'block';
            document.getElementById('tableBody').innerHTML = "<tr><td colspan='10'>Loading...</td></tr>";
            await loadData(sheetName);
        }

        function goHome() {
            document.getElementById('databaseSection').style.display = 'none';
        }

        async function loadData(sheet) {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=read&sheet=${sheet}`);
                const result = await response.json();
                if (result.status === "success") {
                    rawData = result.data;
                    headers = rawData[0];
                    visibleColumns = headers.map((_, i) => i);
                    renderTable();
                    renderFilters();
                }
            } catch (e) { alert("Gagal muat data"); }
        }

        function renderFilters() {
            const container = document.getElementById('filterCheckboxes');
            container.innerHTML = "";
            headers.forEach((h, i) => {
                const div = document.createElement('div');
                div.innerHTML = `<input type="checkbox" checked onchange="toggleColumn(${i}, this.checked)"> ${h}`;
                container.appendChild(div);
            });
        }

        function toggleColumn(index, isVisible) {
            if (isVisible) visibleColumns.push(index);
            else visibleColumns = visibleColumns.filter(i => i !== index);
            renderTable();
        }

        function toggleFilterPanel() {
            const panel = document.getElementById('columnFilterPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function renderTable() {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            
            // Render Head
            let headHtml = "<tr>";
            headers.forEach((h, i) => {
                if (visibleColumns.includes(i)) headHtml += `<th>${h}</th>`;
            });
            head.innerHTML = headHtml + "</tr>";

            // Render Body
            let bodyHtml = "";
            for (let i = 1; i < rawData.length; i++) {
                bodyHtml += "<tr>";
                rawData[i].forEach((cell, idx) => {
                    if (visibleColumns.includes(idx)) {
                        let val = cell || "";
                        if (typeof val === 'string' && val.includes("http")) {
                            val = `<img src="${val}" class="img-cell">`;
                        }
                        bodyHtml += `<td>${val}</td>`;
                    }
                });
                bodyHtml += "</tr>";
            }
            body.innerHTML = bodyHtml;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll("#tableBody tr").forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
            });
        });
    </script>
</body>
</html>
